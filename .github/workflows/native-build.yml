name: Native Build

on:
  push:
    branches: [main]
    paths:
      - 'frontend-react/src/**'
      - 'frontend-react/capacitor.config.ts'
      - 'frontend-react/package.json'
      - 'frontend-react/vite.config.ts'
      - '.github/workflows/native-build.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────────
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install JS dependencies
        working-directory: frontend-react
        run: npm ci

      - name: Build web (capacitor mode)
        working-directory: frontend-react
        run: npm run build:native

      - name: Generate native assets (icons + splash)
        working-directory: frontend-react
        run: |
          mkdir -p assets
          cp src/assets/ZoneDeGrimpeIcon.png assets/icon.png
          npx capacitor-assets generate --iconBackgroundColor '#5D7052' --splashBackgroundColor '#5D7052' --android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Sync Capacitor → Android
        working-directory: frontend-react
        run: npx cap sync android

      - name: Build debug APK
        working-directory: frontend-react/android
        run: ./gradlew assembleDebug --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: zdg-android-debug
          path: frontend-react/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  # ─────────────────────────────────────────────
  ios:
    name: iOS IPA (unsigned)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install JS dependencies
        working-directory: frontend-react
        run: npm ci

      - name: Build web (capacitor mode)
        working-directory: frontend-react
        run: npm run build:native

      - name: Generate native assets (icons + splash)
        working-directory: frontend-react
        run: |
          mkdir -p assets
          cp src/assets/ZoneDeGrimpeIcon.png assets/icon.png
          npx capacitor-assets generate --iconBackgroundColor '#5D7052' --splashBackgroundColor '#5D7052' --ios

      - name: Sync Capacitor → iOS
        working-directory: frontend-react
        run: npx cap sync ios

      - name: Build app (unsigned, iphoneos)
        working-directory: frontend-react/ios/App
        run: |
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath $RUNNER_TEMP/DerivedData \
            build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ENABLE_BITCODE=NO

      - name: Package IPA
        run: |
          APP_PATH=$(find $RUNNER_TEMP/DerivedData -name "*.app" -path "*/Release-iphoneos/*" | head -1)
          echo "App path: $APP_PATH"
          mkdir -p $RUNNER_TEMP/Payload
          cp -r "$APP_PATH" "$RUNNER_TEMP/Payload/App.app"
          cd $RUNNER_TEMP && zip -r ZoneDeGrimpe.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: zdg-ios-unsigned
          path: ${{ runner.temp }}/ZoneDeGrimpe.ipa
          retention-days: 14
