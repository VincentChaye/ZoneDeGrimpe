name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [ main ]
    paths: [ 'frontend/**' ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject commit SHA into service worker cache version
        run: sed -i "s/__SHA__/${{ github.sha }}/g" frontend/sw.js

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - uses: actions/deploy-pages@v4
        id: deployment
