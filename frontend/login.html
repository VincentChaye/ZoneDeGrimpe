<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="ZoneDeGrimpe — Cartographie des spots d'escalade en France." />
  <title>Connexion — ZoneDeGrimpe</title>
  <link rel="icon" href="./assets/ZoneDeGrimpeIcon.png" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#5D7052" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="ZoneDeGrimpe" />
  <link rel="apple-touch-icon" href="./assets/ZoneDeGrimpeIcon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="./style/style.css" />
</head>
<body class="theme page-auth">

  <header class="app-header">
    <a class="brand" href="./">
      <img src="./assets/ZoneDeGrimpeIcon.png" alt="ZoneDeGrimpe" class="brand__icon" />
      <span class="brand__title">ZoneDeGrimpe</span>
    </a>
    <div class="header-actions">
      <a href="./notifications.html" class="notif-bell" id="notifBell" aria-label="Notifications" style="display:none">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="notif-bell__badge" id="notifBadge"></span>
      </a>
      <select id="langSelect" class="lang-select" aria-label="Langue">
        <option value="fr">FR</option>
        <option value="en">EN</option>
        <option value="es">ES</option>
      </select>
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="Basculer le theme">Theme</button>
    </div>
  </header>

  <div class="auth-layout">
    <section class="auth-card">
      <div class="auth-card__header">
        <div class="auth-card__logo">
          <img src="./assets/ZoneDeGrimpeIcon.png" alt="" width="40" height="40" />
        </div>
        <h2 data-i18n="auth.welcome_back">Bon retour parmi nous</h2>
        <p class="auth-card__sub" data-i18n="auth.login_subtitle">Connecte-toi pour acceder a tes spots</p>
      </div>
      <form id="loginForm" class="form">
        <label>
          <span class="form-label" data-i18n="auth.email">Email</span>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 7l-10 7L2 7"/></svg>
            <input type="email" name="email" required autocomplete="email" placeholder="ton@email.com" />
          </div>
        </label>
        <label>
          <span class="form-label" data-i18n="auth.password">Mot de passe</span>
          <div class="input-wrap">
            <svg class="input-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.75"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" name="password" required autocomplete="current-password" placeholder="Ton mot de passe" />
          </div>
        </label>
        <button class="btn" type="submit" data-i18n="auth.login">Se connecter</button>
      </form>
      <p id="loginErr" class="auth-error" style="display:none"></p>
      <div class="auth-divider">
        <span data-i18n="auth.or">ou</span>
      </div>
      <p class="alt-links"><span data-i18n="auth.no_account">Pas encore inscrit ?</span> <a href="./register.html" data-i18n="auth.create_account">Creer un compte</a></p>
    </section>
  </div>

  <script src="./config.js"></script>
  <script type="module" src="./js/ui.js"></script>
  <script type="module" src="./js/login.js"></script>
</body>
</html>
