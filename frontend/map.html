<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZoneDeGrimpe — Carte</title>
  <link rel="icon" href="./assets/ZoneDeGrimpeIcon.png" />
  <link rel="stylesheet" href="./style/style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
</head>
<body class="theme page-map">

  <header class="app-header app-header--compact">
    <a class="brand" href="./">
      <img src="./assets/ZoneDeGrimpeIcon.png" alt="ZoneDeGrimpe" class="brand__icon" />
      <span class="brand__title">ZoneDeGrimpe</span>
    </a>
    <nav id="nav" class="nav" aria-label="Navigation principale">
      <a href="./index.html">Accueil</a>
      <a href="./materiel.html">Matériel</a>
      <a class="active" href="./map.html">Carte</a>
      <a href="./parametres.html">Paramètres</a>
    </nav>
    <button id="themeToggle" class="theme-toggle" type="button" aria-label="Basculer le thème">Thème</button>
  </header>

  <main class="map-layout">
    <div id="map" class="map"></div>

    <!-- Barre de filtres flottante -->
    <div class="filter-bar" id="filterBar" role="region" aria-label="Filtres carte">
      <button id="searchToggleBtn" class="btn btn--ghost btn--compact" title="Rechercher un spot" aria-expanded="false" aria-controls="searchBar">🔍</button>
      <button id="locateBtn" class="btn btn--compact" title="Me localiser">📍</button>
      <select id="filterType" class="filter-select" aria-label="Filtrer par type">
        <option value="">Tous</option>
        <option value="crag">Falaise</option>
        <option value="boulder">Bloc</option>
        <option value="indoor">Salle</option>
      </select>
      <button id="toggleFilters" class="btn btn--ghost btn--compact" title="Plus de filtres">⚙️</button>
      <button id="resetFilters" class="btn btn--ghost btn--compact" title="Réinitialiser les filtres" style="display:none;">↺</button>
    </div>

    <!-- Barre de recherche (masquée par défaut) -->
    <div class="search-bar" id="searchBar" hidden>
      <input type="text" id="searchInput" placeholder="Rechercher un spot…" aria-label="Rechercher un spot" autocomplete="off" />
      <div id="searchResults" class="search-results" aria-live="polite"></div>
    </div>

    <!-- Filtres avancés (masqués par défaut) -->
    <div class="advanced-filters" id="advancedFilters" style="display:none;">
      <div class="filter-group">
        <label for="filterNiveauMin">Niveau minimum</label>
        <select id="filterNiveauMin" class="filter-select" style="width:100%">
          <option value="">Tous</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
          <option value="8">8</option>
          <option value="9">9</option>
        </select>
      </div>
      <div class="filter-group">
        <label for="filterDistance">Distance : <span id="distanceValue">Toutes</span></label>
        <input type="range" id="filterDistance" min="0" max="500" value="500" step="10" style="width:100%" />
      </div>
    </div>

    <!-- Bouton proposer un spot (affiché si connecté) -->
    <button id="proposeSpotBtn" class="btn" style="position:absolute;bottom:1.25rem;left:50%;transform:translateX(-50%);z-index:2000;display:none;gap:.4rem;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.2)">
      + Proposer un spot
    </button>

    <!-- Modal proposition de spot -->
    <dialog id="proposeModal" class="modal">
      <div class="modal__content">
        <h2 style="margin:0 0 1rem;font-family:var(--font-heading)">Proposer un spot</h2>
        <form id="proposeForm">
          <div style="margin-bottom:.75rem">
            <label style="display:block;margin-bottom:.35rem;font-size:.88rem;color:var(--text-2)">Nom du spot *</label>
            <input class="input" type="text" id="pName" required maxlength="120" placeholder="Ex: Rocher des Deux Sœurs" />
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem">
            <div>
              <label style="display:block;margin-bottom:.35rem;font-size:.88rem;color:var(--text-2)">Type *</label>
              <select class="input" id="pType" required>
                <option value="crag">Falaise</option>
                <option value="boulder">Bloc</option>
                <option value="indoor">Salle</option>
              </select>
            </div>
            <div>
              <label style="display:block;margin-bottom:.35rem;font-size:.88rem;color:var(--text-2)">Orientation</label>
              <select class="input" id="pOrientation">
                <option value="">—</option>
                <option value="N">Nord</option>
                <option value="NE">Nord-Est</option>
                <option value="E">Est</option>
                <option value="SE">Sud-Est</option>
                <option value="S">Sud</option>
                <option value="SO">Sud-Ouest</option>
                <option value="O">Ouest</option>
                <option value="NO">Nord-Ouest</option>
              </select>
            </div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem">
            <div>
              <label style="display:block;margin-bottom:.35rem;font-size:.88rem;color:var(--text-2)">Latitude *</label>
              <input class="input" type="number" id="pLat" step="any" required placeholder="46.5" />
            </div>
            <div>
              <label style="display:block;margin-bottom:.35rem;font-size:.88rem;color:var(--text-2)">Longitude *</label>
              <input class="input" type="number" id="pLng" step="any" required placeholder="2.5" />
            </div>
          </div>
          <button type="button" id="pLocateBtn" class="btn btn--ghost btn--compact" style="margin-bottom:.75rem">📍 Utiliser ma position</button>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:.75rem">
            <div>
              <label style="display:block;margin-bottom:.35rem;font-size:.88rem;color:var(--text-2)">Niveau min</label>
              <input class="input" type="text" id="pNiveauMin" placeholder="Ex: 4a" maxlength="10" />
            </div>
            <div>
              <label style="display:block;margin-bottom:.35rem;font-size:.88rem;color:var(--text-2)">Niveau max</label>
              <input class="input" type="number" id="pNiveauMax" placeholder="Ex: 7b" maxlength="10" />
            </div>
          </div>
          <div style="margin-bottom:1rem">
            <label style="display:block;margin-bottom:.35rem;font-size:.88rem;color:var(--text-2)">Description</label>
            <textarea class="input" id="pDescription" rows="3" maxlength="2000" placeholder="Décris le spot…"></textarea>
          </div>
          <p id="proposeErr" style="color:#dc2626;font-size:.85rem;display:none;margin:.5rem 0"></p>
          <div class="modal__actions">
            <button type="button" class="btn btn--ghost" id="proposeCancelBtn">Annuler</button>
            <button type="submit" class="btn" id="proposeSubmitBtn">Envoyer la demande</button>
          </div>
        </form>
      </div>
    </dialog>

    <!-- Loading -->
    <div id="mapLoading" class="map-loading">
      <div class="map-loading__spinner"></div>
      <span>Chargement des spots…</span>
    </div>

    <!-- Toast -->
    <div id="mapToast" class="map-toast" aria-live="assertive" style="display:none;"></div>

    <!-- Bottom sheet fiche spot -->
    <section class="bottom-sheet" id="bottomSheet" aria-hidden="true">
      <button class="bottom-sheet__close" id="sheetClose" aria-label="Fermer">×</button>
      <div class="bottom-sheet__content" id="sheetContent"></div>
    </section>
  </main>

  <footer class="app-footer app-footer--hidden-mobile">
    <p>© <span id="year"></span> ZoneDeGrimpe</p>
  </footer>

  <!-- Bottom Tab Bar (mobile) -->
  <nav class="tab-bar" aria-label="Navigation principale">
    <a href="./index.html" class="tab-bar__item">
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
        <path d="M9 21V12h6v9"/>
      </svg>
      <span>Accueil</span>
    </a>
    <a href="./map.html" class="tab-bar__item active" aria-current="page">
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="10" r="3"/>
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
      </svg>
      <span>Carte</span>
    </a>
    <a href="./materiel.html" class="tab-bar__item">
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M6 9V7a6 6 0 0112 0v2"/>
        <rect x="2" y="9" width="20" height="13" rx="2"/>
        <path d="M9 14h6"/>
      </svg>
      <span>Matériel</span>
    </a>
    <a href="./parametres.html" class="tab-bar__item">
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.58-7 8-7s8 3 8 7"/>
      </svg>
      <span>Profil</span>
    </a>
  </nav>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script type="module" src="./js/map.js"></script>
</body>
</html>
