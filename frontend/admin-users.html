<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin — Utilisateurs · ZoneDeGrimpe</title>
  <link rel="icon" href="./assets/ZoneDeGrimpeIcon.png" />
  <link rel="stylesheet" href="./style/style.css" />
  <link rel="stylesheet" href="./style/admin.css" />
</head>
<body class="theme">

  <header class="app-header">
    <a class="brand" href="./">
      <img src="./assets/ZoneDeGrimpeIcon.png" alt="ZoneDeGrimpe" class="brand__icon" />
      <span class="brand__title">ZoneDeGrimpe</span>
    </a>
    <nav id="nav" class="nav" aria-label="Navigation">
      <a href="./index.html">Accueil</a>
      <a href="./map.html">Carte</a>
      <a href="./parametres.html">Paramètres</a>
      <a href="./admin-spots.html">Admin Spots</a>
      <a class="active" href="./admin-users.html">Admin Users</a>
    </nav>
    <button id="themeToggle" class="theme-toggle" type="button">Thème</button>
  </header>

  <!-- Accès refusé -->
  <div class="admin-denied container" id="accessDenied" hidden>
    <h2>Accès refusé</h2>
    <p>Cette page est réservée aux administrateurs.</p>
    <a class="btn" href="./index.html">Retour à l'accueil</a>
  </div>

  <!-- Contenu admin -->
  <main class="container" id="adminContent" hidden>

    <div class="admin-header">
      <h1>Gestion des Utilisateurs <span class="admin-badge">Admin</span></h1>
      <a class="btn btn--ghost" href="./admin-spots.html">→ Gestion spots</a>
    </div>

    <!-- Stats -->
    <div class="admin-stats">
      <div class="admin-stat">
        <div class="admin-stat__value" id="statTotal">—</div>
        <div class="admin-stat__label">Utilisateurs</div>
      </div>
      <div class="admin-stat">
        <div class="admin-stat__value" id="statAdmins">—</div>
        <div class="admin-stat__label">Admins</div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="admin-toolbar">
      <input class="input" id="userSearch" placeholder="Rechercher par nom ou email…" type="search" />
      <button class="btn" id="searchBtn">Rechercher</button>
    </div>

    <!-- Table -->
    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th>Nom</th>
            <th>Email</th>
            <th>Rôle</th>
            <th>Statut</th>
            <th>Inscrit le</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="usersTableBody">
          <tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--text-2)">Chargement…</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Mobile cards -->
    <div class="pending-cards-mobile" id="usersMobileList"></div>

    <!-- Pagination -->
    <div class="admin-pagination" id="usersPagination"></div>

  </main>

  <!-- Bottom Tab Bar (mobile) -->
  <nav class="tab-bar" aria-label="Navigation principale">
    <a href="./index.html" class="tab-bar__item">
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg>
      <span>Accueil</span>
    </a>
    <a href="./map.html" class="tab-bar__item">
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="10" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
      <span>Carte</span>
    </a>
    <a href="./materiel.html" class="tab-bar__item">
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V7a6 6 0 0112 0v2"/><rect x="2" y="9" width="20" height="13" rx="2"/><path d="M9 14h6"/></svg>
      <span>Matériel</span>
    </a>
    <a href="./parametres.html" class="tab-bar__item">
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.58-7 8-7s8 3 8 7"/></svg>
      <span>Profil</span>
    </a>
  </nav>

  <script src="./config.js"></script>
  <script type="module" src="./js/ui.js"></script>
  <script type="module" src="./js/admin-users.js"></script>
</body>
</html>
