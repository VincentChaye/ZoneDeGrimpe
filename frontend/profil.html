<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ZoneDeGrimpe — Profil</title>
  <link rel="icon" href="./assets/ZoneDeGrimpeIcon.png" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#5D7052" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="./style/style.css" />
  <style>
    .profil-page { padding: 2rem 0 6rem; max-width: 560px; margin: 0 auto; }
    .profil-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .profil-banner {
      height: 100px;
      background: linear-gradient(135deg, var(--accent), var(--gold));
      position: relative;
    }
    .profil-avatar-wrap {
      display: flex;
      justify-content: center;
      margin-top: -40px;
      position: relative;
      z-index: 1;
    }
    .profil-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 4px solid var(--surface);
      object-fit: cover;
      background: var(--surface-2);
    }
    .profil-info {
      text-align: center;
      padding: 1rem 1.5rem 1.5rem;
    }
    .profil-name {
      font-family: var(--font-heading);
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      margin: .5rem 0 .25rem;
    }
    .profil-level {
      display: inline-block;
      padding: .2rem .7rem;
      border-radius: 99px;
      font-size: .76rem;
      font-weight: 700;
      background: var(--accent-muted);
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: .03em;
    }
    .profil-member {
      font-size: .82rem;
      color: var(--text-2);
      margin-top: .5rem;
    }
    .profil-stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      padding: 1.25rem 0;
      margin: 0 1.5rem;
      border-top: 1px solid var(--border);
    }
    .profil-stat {
      text-align: center;
    }
    .profil-stat__value {
      font-family: var(--font-heading);
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
    }
    .profil-stat__label {
      font-size: .76rem;
      color: var(--text-2);
      margin-top: .15rem;
    }
    .profil-roles {
      display: flex;
      justify-content: center;
      gap: .4rem;
      padding-bottom: 1.25rem;
    }
    .profil-role-badge {
      padding: .15rem .55rem;
      border-radius: 99px;
      font-size: .72rem;
      font-weight: 600;
      background: var(--surface-2);
      color: var(--text-2);
    }
    .profil-role-badge--admin {
      background: #fef3c7;
      color: #92400e;
    }
    .profil-error {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-2);
    }
    .profil-loading {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--text-2);
    }
  </style>
</head>
<body class="theme">

  <header class="app-header">
    <a class="brand" href="./">
      <img src="./assets/ZoneDeGrimpeIcon.png" alt="ZoneDeGrimpe" class="brand__icon" />
      <span class="brand__title">ZoneDeGrimpe</span>
    </a>
    <nav id="nav" class="nav" aria-label="Navigation principale">
      <a href="./index.html">Accueil</a>
      <a href="./map.html">Carte</a>
      <a href="./mes-spots.html">Mes Spots</a>
      <a href="./parametres.html">Profil</a>
    </nav>
    <button id="themeToggle" class="theme-toggle" type="button" aria-label="Basculer le theme">Theme</button>
  </header>

  <main class="container profil-page">
    <div id="profilLoading" class="profil-loading">Chargement du profil...</div>
    <div id="profilError" class="profil-error" hidden></div>
    <div id="profilCard" class="profil-card" hidden>
      <div class="profil-banner"></div>
      <div class="profil-avatar-wrap">
        <img id="profilAvatar" class="profil-avatar" alt="Avatar" src="./assets/avatar-default.jpg" />
      </div>
      <div class="profil-info">
        <h1 class="profil-name" id="profilName">—</h1>
        <span class="profil-level" id="profilLevel">—</span>
        <p class="profil-member" id="profilMember"></p>
      </div>
      <div class="profil-stats">
        <div class="profil-stat">
          <div class="profil-stat__value" id="profilSpots">0</div>
          <div class="profil-stat__label">Spots contribues</div>
        </div>
        <div class="profil-stat">
          <div class="profil-stat__value" id="profilApproved">0</div>
          <div class="profil-stat__label">Spots approuves</div>
        </div>
      </div>
      <div class="profil-roles" id="profilRoles"></div>
    </div>
  </main>

  <footer class="app-footer">
    <div class="app-footer__inner">
      <p>&copy; <span id="year"></span> ZoneDeGrimpe</p>
    </div>
  </footer>

  <!-- Bottom Tab Bar (mobile) -->
  <nav class="tab-bar" aria-label="Navigation principale">
    <a href="./index.html" class="tab-bar__item">
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
        <path d="M9 21V12h6v9"/>
      </svg>
      <span>Accueil</span>
    </a>
    <a href="./map.html" class="tab-bar__item">
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="10" r="3"/>
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
      </svg>
      <span>Carte</span>
    </a>
    <a href="./mes-spots.html" class="tab-bar__item">
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
      </svg>
      <span>Mes Spots</span>
    </a>
    <a href="./parametres.html" class="tab-bar__item">
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.58-7 8-7s8 3 8 7"/>
      </svg>
      <span>Profil</span>
    </a>
  </nav>

  <script src="./config.js"></script>
  <script type="module" src="./js/ui.js"></script>
  <script type="module">
    const API_BASE_URL = window.APP_CONFIG?.API_URL || "http://localhost:3000";
    const LEVEL_LABELS = { debutant: "Debutant", intermediaire: "Intermediaire", avance: "Avance" };

    const params = new URLSearchParams(window.location.search);
    const userId = params.get("id");

    if (!userId) {
      showError("Aucun profil specifie.");
    } else {
      loadProfile(userId);
    }

    async function loadProfile(id) {
      try {
        const res = await fetch(`${API_BASE_URL}/api/users/${id}/public`);
        if (res.status === 404) { showError("Profil introuvable."); return; }
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();

        document.getElementById("profilLoading").hidden = true;
        document.getElementById("profilCard").hidden = false;

        document.getElementById("profilName").textContent = data.displayName || "Grimpeur";
        document.getElementById("profilLevel").textContent = LEVEL_LABELS[data.level] || data.level || "Debutant";

        if (data.avatarUrl) {
          document.getElementById("profilAvatar").src = data.avatarUrl;
        }

        if (data.memberSince) {
          const d = new Date(data.memberSince).toLocaleDateString("fr-FR", { year: "numeric", month: "long" });
          document.getElementById("profilMember").textContent = `Membre depuis ${d}`;
        }

        document.getElementById("profilSpots").textContent = data.stats?.spotsContributed || 0;
        document.getElementById("profilApproved").textContent = data.stats?.spotsApproved || 0;

        const rolesEl = document.getElementById("profilRoles");
        if (data.roles?.length) {
          rolesEl.innerHTML = data.roles.map(r =>
            `<span class="profil-role-badge${r === 'admin' ? ' profil-role-badge--admin' : ''}">${r}</span>`
          ).join("");
        }

        document.title = `${data.displayName || "Grimpeur"} — ZoneDeGrimpe`;
      } catch (e) {
        console.error(e);
        showError("Impossible de charger le profil.");
      }
    }

    function showError(msg) {
      document.getElementById("profilLoading").hidden = true;
      const el = document.getElementById("profilError");
      el.hidden = false;
      el.innerHTML = `<p>${msg}</p><a class="btn" href="./index.html" style="margin-top:1rem">Retour a l'accueil</a>`;
    }
  </script>
</body>
</html>
