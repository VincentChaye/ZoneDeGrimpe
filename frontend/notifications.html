<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="ZoneDeGrimpe — Vos notifications." />
  <title>Notifications — ZoneDeGrimpe</title>
  <link rel="icon" href="./assets/ZoneDeGrimpeIcon.png" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#5D7052" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="ZoneDeGrimpe" />
  <link rel="apple-touch-icon" href="./assets/ZoneDeGrimpeIcon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="./style/style.css" />
  <style>
    .notif-page { padding: 1.5rem 0 6rem; }
    .notif-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: .5rem;
    }
    .notif-header h1 {
      font-family: var(--font-heading);
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      color: var(--text);
      margin: 0;
    }
    .btn--ghost {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-2);
      cursor: pointer;
      font: inherit;
      font-weight: 600;
      transition: all .2s;
    }
    .btn--ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn--compact {
      padding: .4rem .75rem;
      font-size: .8rem;
    }
    .notif-list {
      display: flex;
      flex-direction: column;
      gap: .5rem;
    }
    .notif-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .85rem 1rem;
      display: flex;
      align-items: flex-start;
      gap: .75rem;
      transition: all .25s var(--ease);
      cursor: pointer;
    }
    .notif-card:hover {
      box-shadow: var(--shadow);
    }
    .notif-card--unread {
      border-left: 3px solid var(--accent);
      background: var(--accent-muted);
    }
    .notif-card__icon {
      font-size: 1.3rem;
      flex-shrink: 0;
      width: 2rem;
      height: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .notif-card__body { flex: 1; min-width: 0; }
    .notif-card__text {
      font-size: .88rem;
      color: var(--text);
      line-height: 1.4;
    }
    .notif-card--unread .notif-card__text { font-weight: 600; }
    .notif-card__date {
      font-size: .72rem;
      color: var(--text-2);
      margin-top: .2rem;
    }
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-2);
    }
    .notif-login {
      text-align: center;
      padding: 4rem 1rem;
    }
    .notif-login h2 { margin-bottom: .5rem; }
    .notif-login p { color: var(--text-2); margin-bottom: 1rem; }
  </style>
</head>
<body class="theme">

  <header class="app-header">
    <a class="brand" href="./">
      <img src="./assets/ZoneDeGrimpeIcon.png" alt="ZoneDeGrimpe" class="brand__icon" />
      <span class="brand__title">ZoneDeGrimpe</span>
    </a>
    <nav id="nav" class="nav" aria-label="Navigation principale">
      <a href="./index.html" data-i18n="nav.home">Accueil</a>
      <a href="./map.html" data-i18n="nav.map">Carte</a>
      <a href="./mes-spots.html" data-i18n="nav.my_spots">Mes Spots</a>
      <a href="./parametres.html" data-i18n="nav.profile">Profil</a>
    </nav>
    <div class="header-actions">
      <a href="./notifications.html" class="notif-bell" id="notifBell" aria-label="Notifications" style="display:none">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span class="notif-bell__badge" id="notifBadge"></span>
      </a>
      <select id="langSelect" class="lang-select" aria-label="Langue">
        <option value="fr">FR</option>
        <option value="en">EN</option>
        <option value="es">ES</option>
      </select>
      <button id="themeToggle" class="theme-toggle" type="button" aria-label="Basculer le theme">Theme</button>
    </div>
  </header>

  <!-- Not logged in -->
  <div class="container notif-login" id="loginPrompt" hidden>
    <h2 data-i18n="notif.title">Notifications</h2>
    <p>Connecte-toi pour voir tes notifications.</p>
    <a class="btn" href="./login.html?next=notifications.html">Se connecter</a>
  </div>

  <!-- Main content -->
  <main class="container notif-page" id="main" hidden>
    <div class="notif-header">
      <h1 data-i18n="notif.title">Notifications</h1>
      <button id="markAllRead" class="btn btn--ghost btn--compact" data-i18n="notif.mark_all_read">Tout marquer comme lu</button>
    </div>
    <div id="notifList" class="notif-list">
      <p class="empty-state" data-i18n="notif.no_notifications">Aucune notification.</p>
    </div>
  </main>

  <footer class="app-footer">
    <div class="app-footer__inner">
      <p>&copy; <span id="year"></span> ZoneDeGrimpe</p>
    </div>
  </footer>

  <!-- Bottom Tab Bar (mobile) -->
  <nav class="tab-bar" aria-label="Navigation mobile">
    <a href="./index.html" class="tab-bar__item">
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
        <path d="M9 21V12h6v9"/>
      </svg>
      <span data-i18n="nav.home">Accueil</span>
    </a>
    <a href="./map.html" class="tab-bar__item">
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="10" r="3"/>
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
      </svg>
      <span data-i18n="nav.map">Carte</span>
    </a>
    <a href="./mes-spots.html" class="tab-bar__item">
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
      </svg>
      <span data-i18n="nav.my_spots">Mes Spots</span>
    </a>
    <a href="./parametres.html" class="tab-bar__item">
      <svg class="tab-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 20c0-4 3.58-7 8-7s8 3 8 7"/>
      </svg>
      <span data-i18n="nav.profile">Profil</span>
    </a>
  </nav>

  <script src="./config.js"></script>
  <script type="module" src="./js/ui.js"></script>
  <script type="module" src="./js/notifications.js"></script>
</body>
</html>
